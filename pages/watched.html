<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watched — Reelify</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">Reelify</a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="favorites.html">Favorites</a></li>
      <li><a href="watched.html">Watched</a></li>
    </ul>
    <div class="nav-user">
      <span class="nav-username"></span>
      <button class="nav-logout">Log out</button>
    </div>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>

  <!-- Page Header -->
  <header class="page-header">
    <h1>Watched</h1>
  </header>

  <!-- Movie Grid -->
  <main>
    <div id="movie-grid" class="movie-grid"></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Reelify. Powered by <a href="https://www.themoviedb.org" target="_blank" rel="noopener noreferrer">TMDB</a>.</p>
  </footer>

  <script src="../js/app.js"></script>
  <script type="module">
    import { getWatched, isWatched } from '../js/storage.js';
    import { renderMovies } from '../js/movies.js';
    import { initAuthUI } from '../js/auth-ui.js';

    await initAuthUI('login.html');

    const grid = document.getElementById('movie-grid');

    function render() {
      renderMovies(getWatched(), grid);
      grid.querySelectorAll('.btn-watched').forEach(btn => {
        btn.addEventListener('click', () => {
          const card = btn.closest('.movie-card');
          if (!isWatched(Number(card.dataset.id))) {
            card.remove();
            if (!grid.querySelector('.movie-card')) {
              grid.innerHTML = '<p class="empty-state">No watched movies yet.</p>';
            }
          }
        });
      });
    }

    render();
  </script>
</body>
</html>
