<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Reelify</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">Reelify</a>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Log in to your Reelify account</p>

      <p class="form-success" id="success-msg" hidden>Account created! Please log in.</p>
      <p class="form-error" id="error-msg" hidden></p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
            required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
            required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-auth-submit" id="submit-btn">Log In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </main>

  <script type="module">
    import { auth, signInWithEmailAndPassword, onAuthStateChanged } from '../js/firebase.js';

    // Show confirmation banner if redirected from signup
    if (new URLSearchParams(window.location.search).get('created') === '1') {
      document.getElementById('success-msg').hidden = false;
    }

    // Already signed in → skip login page
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'browse.html';
    });

    function friendlyError(code) {
      switch (code) {
        case 'auth/invalid-email':      return 'Please enter a valid email address.';
        case 'auth/invalid-credential':
        case 'auth/user-not-found':
        case 'auth/wrong-password':     return 'Incorrect email or password.';
        default:                        return 'Something went wrong. Please try again.';
      }
    }

    const form      = document.getElementById('login-form');
    const errorMsg  = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in…';

      try {
        await signInWithEmailAndPassword(auth, form.email.value.trim(), form.password.value);
        window.location.href = 'browse.html';
      } catch (err) {
        errorMsg.textContent = friendlyError(err.code);
        errorMsg.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
